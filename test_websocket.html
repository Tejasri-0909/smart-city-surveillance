<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div id="status">Connecting...</div>
    <div id="messages"></div>

    <script>
        const statusDiv = document.getElementById('status');
        const messagesDiv = document.getElementById('messages');
        
        function addMessage(message) {
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            messagesDiv.appendChild(div);
        }
        
        try {
            const ws = new WebSocket('ws://localhost:8000/ws');
            
            ws.onopen = function() {
                statusDiv.textContent = 'Connected';
                statusDiv.style.color = 'green';
                addMessage('WebSocket connected successfully');
                
                // Send a test message
                ws.send(JSON.stringify({ type: 'ping', message: 'Hello from test' }));
            };
            
            ws.onmessage = function(event) {
                addMessage('Received: ' + event.data);
            };
            
            ws.onclose = function(event) {
                statusDiv.textContent = 'Disconnected (Code: ' + event.code + ')';
                statusDiv.style.color = 'red';
                addMessage('WebSocket closed: ' + event.code + ' - ' + event.reason);
            };
            
            ws.onerror = function(error) {
                statusDiv.textContent = 'Error';
                statusDiv.style.color = 'red';
                addMessage('WebSocket error: ' + error);
            };
            
        } catch (error) {
            statusDiv.textContent = 'Failed to create WebSocket';
            statusDiv.style.color = 'red';
            addMessage('Failed to create WebSocket: ' + error);
        }
    </script>
</body>
</html>
