services:
  # Backend API Service
  - type: web
    name: smart-city-surveillance-backend
    env: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: PORT
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /health
    disk:
      name: ai-models
      mountPath: /opt/render/project/src
      sizeGB: 2
    
  # Frontend Static Site
  - type: static
    name: smart-city-surveillance-frontend
    buildCommand: |
      cd frontend
      npm ci --production=false
      npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-city-surveillance-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache