services:
  - type: web
    name: smart-city-surveillance-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install fastapi uvicorn
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        generateValue: true
    healthCheckPath: /health
    
  - type: static
    name: smart-city-surveillance-frontend
    buildCommand: |
      cd frontend
      npm ci
      npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18
    routes:
      - type: rewrite
        source: /*
        destination: /index.html